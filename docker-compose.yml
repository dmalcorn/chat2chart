services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat2chart-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://chat2chart:chat2chart_dev@db:5432/chat2chart
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    container_name: chat2chart-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: chat2chart
      POSTGRES_PASSWORD: chat2chart_dev
      POSTGRES_DB: chat2chart
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chat2chart']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
